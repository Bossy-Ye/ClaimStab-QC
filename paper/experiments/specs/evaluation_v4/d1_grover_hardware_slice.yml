spec_version: 1
pipeline: main
meta:
  name: evaluation_v4_d1_grover_hardware_slice
  description: Small Grover real-hardware slice for distribution-claim validation on IBM hardware.
suite: core
task:
  kind: grover
  suite: core
  params:
    min_qubits: 4
    max_qubits: 4
    instances_per_qubit: 1
methods:
  - name: GroverOracle
    kind: grover
  - name: UniformBaseline
    kind: uniform
claims:
  - type: distribution
    method: GroverOracle
    metric_name: objective
    epsilon: 0.10
    primary_distance: js
    sanity_distance: tvd
    reference_shots: max
perturbations:
  presets: [compilation_only_exact]
sampling:
  mode: full_factorial
  seed: 23
  include_baseline: true
decision_rule:
  threshold: 0.95
  confidence_level: 0.95
backend:
  engine: basic
  noise_model: none

