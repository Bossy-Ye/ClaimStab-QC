spec_version: 1
pipeline: main
meta:
  name: evaluation_v4_d1_vqe_hardware_slice
  description: Small VQE/H2 real-hardware slice for a second-family hardware check.
task:
  kind: external
  entrypoint: examples.community.vqe_pilot_demo.vqe_h2_task:VQEH2PilotTask
  suite: core
  params:
    num_instances: 2
methods:
  - name: VQE_HF
    kind: vqe_hf
  - name: VQE_UCCSD
    kind: vqe_uccsd
claims:
  - type: ranking
    method_a: VQE_UCCSD
    method_b: VQE_HF
    metric_name: energy_error
    higher_is_better: false
    deltas: [0.0, 0.01, 0.05]
perturbations:
  presets: [compilation_only_exact]
sampling:
  mode: full_factorial
  seed: 31
  include_baseline: true
decision_rule:
  threshold: 0.95
  confidence_level: 0.95
backend:
  engine: basic
  noise_model: none

