spec_version: 1
pipeline: main
meta:
  name: evaluation_v4_d0_bv_oracle_only_iqm_fake_rehearsal
  description: Local BVOracle-only rehearsal on an IQM fake 54-qubit backend before facade and real-hardware execution.
suite: core
task:
  kind: bv
  suite: core
  params:
    min_qubits: 4
    max_qubits: 4
    instances_per_qubit: 2
methods:
  - name: BVOracle
    kind: bv
claims:
  - type: decision
    method: BVOracle
    top_k: 1
    label_meta_key: target_label
  - type: decision
    method: BVOracle
    top_k: 3
    label_meta_key: target_label
perturbations:
  presets: [compilation_only_exact]
sampling:
  mode: full_factorial
  seed: 17
  include_baseline: true
decision_rule:
  threshold: 0.95
  confidence_level: 0.95
backend:
  engine: aer
  noise_model: from_device_profile
device_profile:
  enabled: true
  provider: iqm_fake
  name: IQMFakeAphrodite
  mode: noisy_sim
