spec_version: 1
pipeline: main
meta:
  name: evaluation_v2_e4_grover_distribution
  description: Fragility calibration for the distribution claim family under exact-scope evaluation.
suite: standard
task:
  kind: grover
  suite: standard
  params:
    min_qubits: 6
    max_qubits: 10
    instances_per_qubit: 3
methods:
  - name: GroverOracle
    kind: grover
  - name: UniformBaseline
    kind: uniform
claims:
  - type: distribution
    method: GroverOracle
    metric_name: objective
    epsilon: 0.06
    primary_distance: js
    sanity_distance: tvd
    reference_shots: max
  - type: distribution
    method: GroverOracle
    metric_name: objective
    epsilon: 0.10
    primary_distance: js
    sanity_distance: tvd
    reference_shots: max
perturbations:
  presets: [sampling_only_exact, combined_light_exact]
sampling:
  mode: full_factorial
  seed: 13
  include_baseline: true
decision_rule:
  threshold: 0.95
  confidence_level: 0.95
backend:
  engine: basic
  noise_model: none
