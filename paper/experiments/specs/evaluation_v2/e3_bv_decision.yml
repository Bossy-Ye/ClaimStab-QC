spec_version: 1
pipeline: main
meta:
  name: evaluation_v2_e3_bv_decision
  description: Stable-control calibration for the decision claim family under exact-scope evaluation.
suite: standard
task:
  kind: bv
  suite: standard
  params:
    min_qubits: 4
    max_qubits: 10
    instances_per_qubit: 4
methods:
  - name: BVOracle
    kind: bv
  - name: RandomBaseline
    kind: random_baseline
claims:
  - type: decision
    method: BVOracle
    top_k: 1
    label_meta_key: target_label
  - type: decision
    method: BVOracle
    top_k: 3
    label_meta_key: target_label
perturbations:
  presets: [sampling_only_exact, combined_light_exact]
sampling:
  mode: full_factorial
  seed: 21
  include_baseline: true
decision_rule:
  threshold: 0.95
  confidence_level: 0.95
backend:
  engine: basic
  noise_model: none
