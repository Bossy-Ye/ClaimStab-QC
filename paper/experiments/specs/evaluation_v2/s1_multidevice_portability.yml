spec_version: 1
pipeline: multidevice
meta:
  name: evaluation_v2_s1_multidevice_portability
  description: Placeholder multidevice portability spec for evaluation_v2. Requires pipeline alignment before use.
suite: large
task:
  kind: maxcut
  suite: large
  params: {}
methods:
  - name: QAOA_p1
    kind: qaoa
    params: {p: 1}
  - name: QAOA_p2
    kind: qaoa
    params: {p: 2}
  - name: RandomBaseline
    kind: random_baseline
claims:
  - type: ranking
    method_a: QAOA_p2
    method_b: RandomBaseline
    deltas: [0.0, 0.01, 0.05]
  - type: ranking
    method_a: QAOA_p2
    method_b: QAOA_p1
    deltas: [0.0, 0.01, 0.05]
  - type: ranking
    method_a: QAOA_p1
    method_b: RandomBaseline
    deltas: [0.0, 0.01, 0.05]
perturbations:
  transpile_space: compilation_only_exact
  noisy_space: sampling_only_exact
sampling:
  mode: full_factorial
  seed: 0
  include_baseline: true
decision_rule:
  threshold: 0.95
  confidence_level: 0.95
backend:
  engine: auto
  noise_model: from_device_profile
device_profile:
  enabled: true
  provider: ibm_fake
  mode: transpile_only
multidevice:
  run: transpile_only
  transpile_devices: [FakeBrisbane, FakePrague, FakeSherbrooke, FakeKyoto, FakeTorino]
  transpile_claim_pairs: [QAOA_p2>RandomBaseline, QAOA_p2>QAOA_p1, QAOA_p1>RandomBaseline]
