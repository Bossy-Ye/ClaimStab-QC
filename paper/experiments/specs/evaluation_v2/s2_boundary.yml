spec_version: 1
pipeline: main
meta:
  name: evaluation_v2_s2_boundary
  description: Boundary-sensitive ranking challenge under exact-scope evaluation.
suite: standard
task:
  kind: maxcut
  suite: standard
  params: {}
methods:
  - name: QAOA_p1
    kind: qaoa
    params: {p: 1}
  - name: QAOA_p2
    kind: qaoa
    params: {p: 2}
  - name: RandomBaseline
    kind: random_baseline
claims:
  - type: ranking
    method_a: QAOA_p2
    method_b: QAOA_p1
    deltas: [0.0, 0.01, 0.02, 0.05]
  - type: ranking
    method_a: QAOA_p2
    method_b: RandomBaseline
    deltas: [0.0, 0.01, 0.02, 0.05]
perturbations:
  presets: [sampling_only_exact, combined_light_exact]
sampling:
  mode: full_factorial
  seed: 19
  include_baseline: true
decision_rule:
  threshold: 0.95
  confidence_level: 0.95
backend:
  engine: basic
  noise_model: none
