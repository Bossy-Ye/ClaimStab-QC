spec_version: 1
pipeline: main
meta:
  name: paper_structural
  description: Circuit-level structural compilation benchmark (GHZ).
suite: standard
task:
  kind: ghz
  suite: standard
  params:
    min_qubits: 6
    max_qubits: 14
    step: 2
methods:
  - name: GHZ_Linear
    kind: ghz_linear
  - name: GHZ_Star
    kind: ghz_star
  - name: RandomBaseline
    kind: random_baseline
claims:
  - type: ranking
    method_a: GHZ_Linear
    method_b: GHZ_Star
    metric_name: circuit_depth
    higher_is_better: false
    deltas: [0.0, 1.0, 2.0]
  - type: ranking
    method_a: GHZ_Linear
    method_b: GHZ_Star
    metric_name: two_qubit_count
    higher_is_better: false
    deltas: [0.0, 1.0, 2.0]
perturbations:
  presets: [compilation_only, combined_light]
sampling:
  mode: random_k
  sample_size: 48
  seed: 17
  include_baseline: true
decision_rule:
  threshold: 0.95
  confidence_level: 0.95
backend:
  engine: basic
  noise_model: none
device_profile:
  enabled: false
  provider: none
  mode: transpile_only

