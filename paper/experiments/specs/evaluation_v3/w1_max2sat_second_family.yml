spec_version: 1
pipeline: main
meta:
  name: evaluation_v3_w1_max2sat_second_family
  description: Max-2-SAT QAOA-style second-family experiment under exact-scope full-factorial evaluation.

task:
  kind: external
  entrypoint: examples.community.max2sat_pilot_demo.max2sat_task:Max2SATQAOAPilotTask
  suite: core
  params:
    num_instances: 6

methods:
  - name: QAOA_p1
    kind: qaoa
    params: {p: 1}
  - name: QAOA_p2
    kind: qaoa
    params: {p: 2}
  - name: RandomBaseline
    kind: random_baseline

claims:
  - type: ranking
    method_a: QAOA_p2
    method_b: RandomBaseline
    metric_name: objective
    higher_is_better: true
    deltas: [0.0, 0.01, 0.05]
  - type: ranking
    method_a: QAOA_p2
    method_b: QAOA_p1
    metric_name: objective
    higher_is_better: true
    deltas: [0.0, 0.01, 0.05]
  - type: ranking
    method_a: QAOA_p1
    method_b: RandomBaseline
    metric_name: objective
    higher_is_better: true
    deltas: [0.0, 0.01, 0.05]

perturbations:
  presets: [compilation_only_exact, combined_light_exact]

sampling:
  mode: full_factorial
  seed: 31
  include_baseline: true

decision_rule:
  threshold: 0.95
  confidence_level: 0.95

backend:
  engine: basic
  noise_model: none
