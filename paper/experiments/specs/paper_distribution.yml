spec_version: 1
pipeline: main
meta:
  name: paper_distribution
  description: Distribution-claim benchmark for Grover under perturbation variability.
suite: standard
task:
  kind: grover
  suite: standard
  params:
    min_qubits: 6
    max_qubits: 10
    instances_per_qubit: 3
methods:
  - name: GroverOracle
    kind: grover
  - name: UniformBaseline
    kind: uniform
claims:
  - type: distribution
    method: GroverOracle
    metric_name: objective
    epsilon: 0.06
    primary_distance: js
    sanity_distance: tvd
    reference_shots: max
  - type: distribution
    method: GroverOracle
    metric_name: objective
    epsilon: 0.10
    primary_distance: js
    sanity_distance: tvd
    reference_shots: max
perturbations:
  presets: [sampling_only, combined_light]
sampling:
  mode: random_k
  sample_size: 48
  seed: 13
  include_baseline: true
decision_rule:
  threshold: 0.95
  confidence_level: 0.95
backend:
  engine: basic
  noise_model: none
device_profile:
  enabled: false
  provider: none
  mode: transpile_only
