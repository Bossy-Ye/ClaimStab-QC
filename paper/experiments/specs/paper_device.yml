spec_version: 1
pipeline: multidevice
meta:
  name: paper_device
  description: Device-aware extension (transpile-only + optional noisy sim)
suite: standard
task:
  kind: maxcut
  suite: standard
  params: {}
methods:
  - name: QAOA_p1
    kind: qaoa
    params: {p: 1}
  - name: QAOA_p2
    kind: qaoa
    params: {p: 2}
  - name: RandomBaseline
    kind: random_baseline
claims:
  - type: ranking
    method_a: QAOA_p1
    method_b: QAOA_p2
    metric_name: circuit_depth
    higher_is_better: false
    deltas: [0.0, 0.01]
  - type: ranking
    method_a: QAOA_p2
    method_b: RandomBaseline
    metric_name: expected_cut
    higher_is_better: true
    deltas: [0.0, 0.01, 0.05]
perturbations:
  transpile_space: compilation_only
  noisy_space: sampling_only
sampling:
  mode: full_factorial
  seed: 0
  include_baseline: true
decision_rule:
  threshold: 0.95
  confidence_level: 0.95
backend:
  engine: auto
  noise_model: from_device_profile
device_profile:
  enabled: true
  provider: ibm_fake
  mode: transpile_only
multidevice:
  run: all
  transpile_devices: [FakeManilaV2, FakeBrisbane, FakePrague, FakeSherbrooke, FakeKyoto, FakeTorino]
  noisy_devices: [FakeManilaV2, FakeBrisbane]
  transpile_claim_pairs: [QAOA_p1>QAOA_p2, QAOA_p1>RandomBaseline, QAOA_p2>RandomBaseline]
  noisy_claim_pairs: [QAOA_p2>RandomBaseline, QAOA_p2>QAOA_p1, QAOA_p1>RandomBaseline]
