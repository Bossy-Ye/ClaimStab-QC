spec_version: 1
pipeline: main
meta:
  name: paper_decision
  description: Decision-claim benchmark for BV under perturbation variability.
suite: standard
task:
  kind: bv
  suite: standard
  params:
    min_qubits: 4
    max_qubits: 10
    instances_per_qubit: 4
methods:
  - name: BVOracle
    kind: bv
  - name: RandomBaseline
    kind: random_baseline
claims:
  - type: decision
    method: BVOracle
    top_k: 1
    label_meta_key: target_label
  - type: decision
    method: BVOracle
    top_k: 3
    label_meta_key: target_label
perturbations:
  presets: [sampling_only, combined_light]
sampling:
  mode: random_k
  sample_size: 64
  seed: 21
  include_baseline: true
decision_rule:
  threshold: 0.95
  confidence_level: 0.95
backend:
  engine: basic
  noise_model: none
device_profile:
  enabled: false
  provider: none
  mode: transpile_only
