paper_claims:
  - id: C1
    text: "QAOA_p2 outperforms RandomBaseline under compilation variability."
    mapping:
      type: ranking
      claim_pair: QAOA_p2>RandomBaseline
      space: compilation_only
      delta: 0.0

  - id: C2
    text: "QAOA_p2 beats QAOA_p1 by at least delta=0.01 under sampling variability."
    mapping:
      type: ranking
      claim_pair: QAOA_p2>QAOA_p1
      space: sampling_only
      delta: 0.01

  - id: C3
    text: "QAOA_p1 outperforms RandomBaseline under combined variability with delta=0.05."
    mapping:
      type: ranking
      claim_pair: QAOA_p1>RandomBaseline
      space: combined_light
      delta: 0.05
