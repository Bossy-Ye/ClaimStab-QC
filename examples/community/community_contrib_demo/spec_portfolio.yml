spec_version: 1
pipeline: main
meta:
  name: outside_user_portfolio_demo
  description: Community user demo using custom portfolio allocation task plugin; includes one intentionally harder claim (RiskAware>UniformMix) to demonstrate instability diagnostics.

task:
  kind: external
  entrypoint: examples.community.community_contrib_demo.portfolio_task:PortfolioAllocationTask
  suite: core
  params:
    num_qubits: 6
    num_instances: 8

methods:
  - name: RiskAware
    kind: risk_aware
    params:
      theta_high: 1.7
      theta_low: 0.9
  - name: UniformMix
    kind: uniform_mix
  - name: Conservative
    kind: conservative
    params:
      theta: 1.0

claims:
  - type: ranking
    method_a: RiskAware
    method_b: UniformMix
    deltas: [0.0, 0.02]
  - type: ranking
    method_a: UniformMix
    method_b: Conservative
    deltas: [0.0, 0.02]

perturbations:
  presets: [sampling_only, combined_light]

sampling:
  mode: random_k
  sample_size: 20
  seed: 11
  include_baseline: true

decision_rule:
  threshold: 0.95
  confidence_level: 0.95

backend:
  engine: basic
  noise_model: none
