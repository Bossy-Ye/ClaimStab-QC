spec_version: 1
pipeline: main
meta:
  name: adaptive_maxcut_smoke
  description: Small adaptive-ci smoke check for ranking claims.
suite: core
task:
  kind: maxcut
  suite: core
  params: {}
methods:
  - name: QAOA_p1
    kind: qaoa
    params: {p: 1}
  - name: RandomBaseline
    kind: random_baseline
claims:
  - type: ranking
    method_a: QAOA_p1
    method_b: RandomBaseline
    metric_name: objective
    deltas: [0.0]
perturbations:
  preset: sampling_only
sampling:
  mode: adaptive_ci
  target_ci_width: 0.08
  max_sample_size: 24
  min_sample_size: 8
  step_size: 4
  seed: 7
  include_baseline: true
decision_rule:
  threshold: 0.95
  confidence_level: 0.95
backend:
  engine: basic
  noise_model: none
device_profile:
  enabled: false
  provider: none
  mode: transpile_only
