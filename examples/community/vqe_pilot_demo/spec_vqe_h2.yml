spec_version: 1
pipeline: main
meta:
  name: vqe_h2_pilot_demo
  description: Supporting VQE-style H2 pilot using a diagonal energy proxy under exact-scope evaluation.

task:
  kind: external
  entrypoint: examples.community.vqe_pilot_demo.vqe_h2_task:VQEH2PilotTask
  suite: core
  params:
    num_instances: 6

methods:
  - name: VQE_HF
    kind: vqe_hf
  - name: VQE_HEA
    kind: vqe_hea
  - name: VQE_UCCSD
    kind: vqe_uccsd

claims:
  - type: ranking
    method_a: VQE_UCCSD
    method_b: VQE_HF
    metric_name: energy_error
    higher_is_better: false
    deltas: [0.0, 0.01, 0.05]
  - type: ranking
    method_a: VQE_UCCSD
    method_b: VQE_HEA
    metric_name: energy_error
    higher_is_better: false
    deltas: [0.0, 0.01, 0.05]
  - type: ranking
    method_a: VQE_HEA
    method_b: VQE_HF
    metric_name: energy_error
    higher_is_better: false
    deltas: [0.0, 0.01, 0.05]

perturbations:
  presets: [compilation_only_exact, combined_light_exact]

sampling:
  mode: random_k
  sample_size: 16
  seed: 29
  include_baseline: true

decision_rule:
  threshold: 0.95
  confidence_level: 0.95

backend:
  engine: basic
  noise_model: none
