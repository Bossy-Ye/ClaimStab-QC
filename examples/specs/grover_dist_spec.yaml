spec_version: 1
pipeline: main
meta:
  name: grover_distribution
  description: Grover distribution-claim stress run under sampling perturbations.
suite: core
task:
  kind: grover
  suite: core
  params:
    min_qubits: 6
    max_qubits: 8
    instances_per_qubit: 2
methods:
  - name: GroverOracle
    kind: grover
  - name: UniformBaseline
    kind: uniform
claims:
  - type: distribution
    method: GroverOracle
    metric_name: objective
    epsilon: 0.06
    primary_distance: js
    sanity_distance: tvd
    reference_shots: max
perturbations:
  preset: sampling_only
sampling:
  mode: random_k
  sample_size: 24
  seed: 11
  include_baseline: true
decision_rule:
  threshold: 0.95
  confidence_level: 0.95
backend:
  engine: basic
  noise_model: none
