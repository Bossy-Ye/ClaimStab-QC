spec_version: 1
pipeline: main
meta:
  name: adaptive_bv_smoke
  description: Small adaptive-ci smoke check for CLI users.
suite: core
task:
  kind: bv
  suite: core
  params:
    hidden_strings: ["0001", "0011", "0101"]
methods:
  - name: BVOracle
    kind: bv
  - name: RandomBaseline
    kind: random_baseline
claims:
  - type: decision
    method: BVOracle
    top_k: 1
    label_meta_key: target_label
perturbations:
  preset: sampling_only
sampling:
  mode: adaptive_ci
  target_ci_width: 0.10
  max_sample_size: 16
  min_sample_size: 4
  step_size: 4
  seed: 7
  include_baseline: true
decision_rule:
  threshold: 0.95
  confidence_level: 0.95
backend:
  engine: basic
  noise_model: none
device_profile:
  enabled: false
  provider: none
  mode: transpile_only
