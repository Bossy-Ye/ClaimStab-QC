site_name: ClaimStab-QC
site_description: Claim-centric stability validation for quantum software experiments
site_url: https://bossy-ye.github.io/ClaimStab-QC/
repo_url: https://github.com/Bossy-Ye/ClaimStab-QC
repo_name: Bossy-Ye/ClaimStab-QC

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: teal
      accent: indigo

nav:
  - Home: index.md
  - Live Claim Explorer: explorer.md
  - Quickstart: quickstart.md
  - Custom Task Quickstart: custom_task_quickstart.md
  - ClaimAtlas Dataset: atlas.md
  - Dataset Registry: dataset_registry.md
  - Examples & Outputs: examples.md
  - Reproduction Contract: reproduction_contract.md
  - Concepts:
      - Claims: concepts/claims.md
      - Perturbations: concepts/perturbations.md
      - Formal Definitions: concepts/formal_definitions.md
      - Naive Baseline Policy: concepts/naive_baseline_policy.md
      - Threats to Validity: concepts/threats_to_validity.md
      - Extending: concepts/extending.md
  - Results:
      - Main Results: results/main_results.md
      - Structural Benchmark: results/structural_benchmark.md
      - Device-aware Results: results/device_aware.md
      - Figures: results/figures.md
  - Reproduce: reproduce.md
  - Output Map: output_map.md
  - Trace Cache Replay: trace_cache_replay.md
  - Artifact: artifact.md
  - Appendix:
      - Architecture: ARCHITECTURE.md
      - Experiment Playbook: EXPERIMENT_PLAYBOOK.md
      - Implementation Catalog: generated/implementation_catalog.md
  - Cite: cite.md

plugins:
  - search

markdown_extensions:
  - admonition
  - footnotes
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - assets/claim_explorer.js

extra_css:
  - assets/extra.css
