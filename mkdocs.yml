site_name: ClaimStab-QC
site_description: Claim-centric stability validation for quantum software experiments
site_url: https://bossy-ye.github.io/ClaimStab-QC/
repo_url: https://github.com/Bossy-Ye/ClaimStab-QC
repo_name: Bossy-Ye/ClaimStab-QC

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: teal
      accent: indigo

nav:
  - Start Here:
      - Overview: index.md
      - Design Your Own Case: design_your_own_case.md
      - Examples & Outputs: examples.md
      - Quickstart: quickstart.md
  - Paper Evidence:
      - Main Results: results/main_results.md
      - Evaluation Readiness: results/evaluation_readiness.md
      - Figures: results/figures.md
      - Experiment Matrix: experiment_matrix.md
      - Reproduce: reproduce.md
  - Concepts:
      - Claims: concepts/claims.md
      - Formal Definitions: concepts/formal_definitions.md
      - Perturbations: concepts/perturbations.md
  - Advanced:
      - Output Map: output_map.md
      - Reproduction Contract: reproduction_contract.md
      - Compatibility Contract: compatibility_contract.md
      - ClaimAtlas Guide (Advanced): atlas.md
      - Live Claim Explorer: explorer.md
      - Dataset Registry (Advanced): dataset_registry.md
  - Cite: cite.md

plugins:
  - search

markdown_extensions:
  - admonition
  - footnotes
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - assets/claim_explorer.js
  - assets/dataset_registry.js

extra_css:
  - assets/extra.css
