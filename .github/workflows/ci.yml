name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
        install-variant: ["base", "aer", "aer_ibm"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package variant
        run: |
          python -m pip install --upgrade pip
          if [ "${{ matrix.install-variant }}" = "base" ]; then
            python -m pip install -e .
          elif [ "${{ matrix.install-variant }}" = "aer" ]; then
            python -m pip install -e ".[aer]"
          else
            python -m pip install -e ".[aer,ibm]"
          fi
          python -m pip install pytest

      - name: Show variant
        run: |
          echo "Python: ${{ matrix.python-version }}"
          echo "Install variant: ${{ matrix.install-variant }}"

      - name: Run tests
        run: |
          PYTHONPATH=. pytest -q
