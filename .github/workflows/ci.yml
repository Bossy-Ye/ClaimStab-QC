name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
        install-variant: ["base", "aer", "aer_ibm"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package variant
        run: |
          python -m pip install --upgrade pip
          if [ "${{ matrix.install-variant }}" = "base" ]; then
            python -m pip install -e .
          elif [ "${{ matrix.install-variant }}" = "aer" ]; then
            python -m pip install -e ".[aer]"
          else
            python -m pip install -e ".[aer,ibm]"
          fi
          python -m pip install pytest

      - name: Show variant
        run: |
          echo "Python: ${{ matrix.python-version }}"
          echo "Install variant: ${{ matrix.install-variant }}"

      - name: Run tests
        run: |
          PYTHONPATH=. pytest -q

  compat_guardrails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest

      - name: Run refactor compatibility guardrails
        run: |
          PYTHONPATH=. pytest -q claimstab/tests/test_pipeline_characterization.py claimstab/tests/test_refactor_artifact_compat.py
          PYTHONPATH=. python -m claimstab.scripts.check_refactor_compat --mode all

      - name: Run paper-track smoke tests
        run: |
          PYTHONPATH=. pytest -q \
            claimstab/analysis/tests/test_paper_claims.py \
            claimstab/tests/test_figures_rq4_adaptive.py \
            claimstab/tests/test_figures_multidevice_heatmap.py \
            claimstab/tests/test_export_paper_pack.py \
            claimstab/tests/test_exp_rq4_adaptive.py
