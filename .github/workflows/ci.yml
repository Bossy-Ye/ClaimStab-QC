name: CI

on:
  push:
    branches: ["main"]
  pull_request:

env:
  PYTHONHASHSEED: "0"
  MPLBACKEND: "Agg"
  TZ: "UTC"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
        install-variant: ["base", "aer", "aer_ibm"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package variant
        run: |
          python -m pip install --upgrade pip
          if [ "${{ matrix.install-variant }}" = "base" ]; then
            python -m pip install -e .
          elif [ "${{ matrix.install-variant }}" = "aer" ]; then
            python -m pip install -e ".[aer]"
          else
            python -m pip install -e ".[aer,ibm]"
          fi
          python -m pip install pytest

      - name: Show variant
        run: |
          echo "Python: ${{ matrix.python-version }}"
          echo "Install variant: ${{ matrix.install-variant }}"
          python -m pip list

      - name: Run tests
        run: |
          set -o pipefail
          PYTHONPATH=. pytest -q -ra --maxfail=1 --durations=20 2>&1 | tee pytest.log

      - name: Upload pytest log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log-py${{ matrix.python-version }}-${{ matrix.install-variant }}
          path: pytest.log

  compat_guardrails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest
          python -m pip list

      - name: Run refactor compatibility guardrails
        run: |
          set -o pipefail
          PYTHONPATH=. pytest -q -ra --maxfail=1 claimstab/tests/test_pipeline_characterization.py claimstab/tests/test_refactor_artifact_compat.py 2>&1 | tee compat_pytest.log
          PYTHONPATH=. python -m claimstab.scripts.check_refactor_compat --mode all 2>&1 | tee compat_guardrails.log

      - name: Run paper-track smoke tests
        run: |
          set -o pipefail
          PYTHONPATH=. pytest -q -ra --maxfail=1 \
            claimstab/analysis/tests/test_paper_claims.py \
            claimstab/tests/test_figures_rq4_adaptive.py \
            claimstab/tests/test_figures_multidevice_heatmap.py \
            claimstab/tests/test_export_paper_pack.py \
            claimstab/tests/test_exp_rq4_adaptive.py 2>&1 | tee paper_track_smoke.log

      - name: Upload guardrail logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compat-guardrails-logs
          path: |
            compat_pytest.log
            compat_guardrails.log
            paper_track_smoke.log
