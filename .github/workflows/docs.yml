name: Docs

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[docs]"

      - name: Refresh dataset registry page
        run: |
          python - <<'PY'
          import importlib.util
          import sys
          from pathlib import Path

          module_path = Path("claimstab/atlas/catalog.py")
          spec = importlib.util.spec_from_file_location("claimstab_atlas_catalog", module_path)
          if spec is None or spec.loader is None:
              raise RuntimeError(f"Unable to load module spec: {module_path}")
          module = importlib.util.module_from_spec(spec)
          sys.modules[spec.name] = module
          spec.loader.exec_module(module)
          output = Path("docs/dataset_registry.md")
          output.write_text(
              module.build_dataset_registry_markdown(atlas_root="atlas"),
              encoding="utf-8",
          )
          print(f"Wrote dataset registry page: {output}")
          PY

      - name: Build MkDocs site
        run: |
          python -m mkdocs build --strict

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
