spec_version: 1
pipeline: main
meta:
  name: atlas_bv_demo
  description: Non-MaxCut demo for ClaimAtlas (BV decision claims).
suite: core
task:
  kind: bv
  suite: core
  params:
    min_qubits: 4
    max_qubits: 8
    instances_per_qubit: 4
methods:
  - name: BVOracle
    kind: bv
  - name: RandomBaseline
    kind: random_baseline
claims:
  - type: decision
    method: BVOracle
    top_k: 1
    label_meta_key: target_label
  - type: decision
    method: BVOracle
    top_k: 3
    label_meta_key: target_label
perturbations:
  preset: sampling_only
sampling:
  mode: random_k
  sample_size: 10
  seed: 7
  include_baseline: true
decision_rule:
  threshold: 0.95
  confidence_level: 0.95
backend:
  engine: basic
  noise_model: none
device_profile:
  enabled: false
  provider: none
  mode: transpile_only
