spec_version: 1
pipeline: main
meta:
  name: paper_boundary
  description: Boundary-challenge ranking run to expose near-threshold stability transitions.
suite: standard
task:
  kind: maxcut
  suite: standard
  params: {}
methods:
  - name: QAOA_p1
    kind: qaoa
    params: {p: 1}
  - name: QAOA_p2
    kind: qaoa
    params: {p: 2}
  - name: RandomBaseline
    kind: random_baseline
claims:
  - type: ranking
    method_a: QAOA_p2
    method_b: QAOA_p1
    deltas: [0.0, 0.01, 0.02, 0.05]
  - type: ranking
    method_a: QAOA_p2
    method_b: RandomBaseline
    deltas: [0.0, 0.01, 0.02, 0.05]
perturbations:
  presets: [sampling_only, combined_light]
sampling:
  mode: random_k
  sample_size: 96
  seed: 19
  include_baseline: true
decision_rule:
  threshold: 0.95
  confidence_level: 0.95
backend:
  engine: basic
  noise_model: none
device_profile:
  enabled: false
  provider: none
  mode: transpile_only
