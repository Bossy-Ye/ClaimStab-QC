spec_version: 1
pipeline: main
meta:
  name: paper_main
  description: Two-phase style main-paper comparative track
suite: large
task:
  kind: maxcut
  suite: large
  params: {}
methods:
  - name: QAOA_p1
    kind: qaoa
    params: {p: 1}
  - name: QAOA_p2
    kind: qaoa
    params: {p: 2}
  - name: RandomBaseline
    kind: random_baseline
claims:
  - type: ranking
    method_a: QAOA_p2
    method_b: RandomBaseline
    deltas: [0.0, 0.01, 0.05]
  - type: ranking
    method_a: QAOA_p2
    method_b: QAOA_p1
    deltas: [0.0, 0.01, 0.05]
  - type: ranking
    method_a: QAOA_p1
    method_b: RandomBaseline
    deltas: [0.0, 0.01, 0.05]
perturbations:
  presets: [compilation_only, sampling_only, combined_light]
sampling:
  mode: random_k
  sample_size: 64
  seed: 42
  include_baseline: true
decision_rule:
  threshold: 0.95
  confidence_level: 0.95
backend:
  engine: basic
  noise_model: none
device_profile:
  enabled: false
  provider: none
  mode: transpile_only
